<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>СИК в САЩ</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'IBM Plex Mono', monospace;
  background: #0d0f14; color: #e8e4d9;
  height: 100vh; display: flex; flex-direction: column; overflow: hidden;
}

/* ── Header ── */
header {
  background: #161920; border-bottom: 1px solid #2a2f3d;
  flex-shrink: 0; padding: 8px 16px;
  display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
}
header h1 {
  font-family: 'Playfair Display', serif; font-size: 1.1rem;
  color: #c8a84b; white-space: nowrap;
}
.subtitle { font-size: 0.6rem; color: #6b7280; text-transform: uppercase; letter-spacing: 0.1em; margin-top: 2px; }

.header-right {
  margin-left: auto;
  display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
}

/* ── Legend ── */
.legend {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  font-size: 0.6rem; color: #8a95a8;
  text-transform: uppercase; letter-spacing: 0.07em;
}
.legend-item { display: flex; align-items: center; gap: 4px; cursor: default; }
.leg-dot { width: 9px; height: 9px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2); flex-shrink: 0; }

/* ── Map ── */
#map { flex: 1; width: 100%; }

/* ── Stats panel ── */
#stats {
  position: absolute; bottom: 30px; right: 10px;
  background: #161920ee; border: 1px solid #2a2f3d;
  padding: 10px 14px; font-size: 0.63rem; line-height: 2.1;
  z-index: 1000; min-width: 230px;
}
.stat { display: flex; justify-content: space-between; gap: 16px; }
.stat-label { color: #6b7280; text-transform: uppercase; letter-spacing: 0.07em; }
.stat-pool   { color: #e8e4d9; }
.stat-open   { color: #4bc84b; }
.stat-emb    { color: #3d8b5e; }
.stat-served { color: #4b8ec8; }
.stat-atrisk { color: #e8913a; }
.stat-lost   { color: #c84b4b; }
.stat-divider { border-top: 1px solid #2a2f3d; margin: 3px 0; }
.stat-note {
  font-size: 0.52rem; color: #4a5568; margin-top: 6px;
  border-top: 1px solid #2a2f3d; padding-top: 6px; line-height: 1.65;
}

/* ── Button ── */
.toggle-btn {
  padding: 3px 10px; font-size: 0.6rem; font-family: 'IBM Plex Mono', monospace;
  background: #1e2a3a; border: 1px solid #2a2f3d; color: #8a95a8;
  cursor: pointer; border-radius: 2px;
  text-transform: uppercase; letter-spacing: 0.07em; transition: all 0.15s;
}
.toggle-btn:hover { border-color: #6b7280; color: #c8c4b9; }

/* ── Summary modal ── */
#summary-modal {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.75); z-index: 2000;
  align-items: center; justify-content: center;
}
#summary-modal.open { display: flex; }
#summary-box {
  background: #161920; border: 1px solid #2a2f3d;
  padding: 16px 20px; max-width: 620px; width: 92%;
  max-height: 82vh; overflow-y: auto; position: relative;
}
.summary-close {
  position: absolute; top: 10px; right: 14px;
  background: none; border: none; color: #6b7280;
  font-size: 18px; cursor: pointer; line-height: 1;
}
.summary-close:hover { color: #e8e4d9; }
.summary-heading { font-family: 'Playfair Display', serif; font-size: 1rem; color: #c8a84b; margin-bottom: 12px; }
.summary-sub { font-size: 0.6rem; color: #6b7280; text-transform: uppercase; letter-spacing: 0.07em; margin: 12px 0 4px; }
.summary-hdr {
  display: flex; gap: 8px; font-size: 0.55rem; color: #4a5568;
  text-transform: uppercase; letter-spacing: 0.05em;
  border-bottom: 1px solid #2a2f3d; padding-bottom: 3px; margin-bottom: 2px;
}
.summary-row {
  display: flex; align-items: center; gap: 8px;
  font-size: 0.6rem; padding: 3px 0; border-bottom: 1px solid #1a1f2a;
}
.summary-row:last-child { border-bottom: none; }
.summary-idx  { color: #4a5568; min-width: 2ch; text-align: right; flex-shrink: 0; }
.summary-name { flex: 1; color: #e8e4d9; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.summary-emb  { font-size: 0.5rem; color: #3d8b5e; background: #0d2a1a; border: 1px solid #2a5a3a; padding: 1px 4px; border-radius: 2px; flex-shrink: 0; }
.summary-zav  { color: #4bc84b; min-width: 4ch; text-align: right; flex-shrink: 0; }
.summary-v24  { color: #8a95a8; min-width: 4ch; text-align: right; flex-shrink: 0; }

/* ── Popups ── */
.leaflet-popup-content-wrapper {
  background: #161920 !important; border: 1px solid #2a2f3d !important;
  border-radius: 2px !important; box-shadow: 0 4px 20px rgba(0,0,0,0.6) !important;
  color: #e8e4d9 !important; font-family: 'IBM Plex Mono', monospace !important;
}
.leaflet-popup-tip { background: #2a2f3d !important; }
.leaflet-popup-close-button { color: #6b7280 !important; font-size: 18px !important; }
.popup-name  { font-family: 'Playfair Display', serif; font-size: 0.95rem; color: #c8a84b; margin-bottom: 5px; line-height: 1.3; }
.popup-count { font-size: 1.2rem; font-weight: 500; color: #fff; }
.popup-count span { font-size: 0.62rem; color: #6b7280; margin-left: 4px; }
.popup-sub   { font-size: 0.62rem; color: #8a95a8; margin-top: 3px; }
.popup-badge { display: inline-block; font-size: 0.58rem; padding: 2px 7px; border-radius: 2px; margin-bottom: 5px; }
.badge-open      { background: #1a3a1a; color: #4bc84b; border: 1px solid #2a6a2a; }
.badge-mandatory { background: #0d2a1a; color: #3d8b5e; border: 1px solid #2a5a3a; }
.badge-served    { background: #0e1a2a; color: #4b8ec8; border: 1px solid #2a4a6a; }
.badge-atrisk    { background: #2a1a08; color: #e8913a; border: 1px solid #6a4010; }
.badge-lost      { background: #3a1a1a; color: #c84b4b; border: 1px solid #6a2a2a; }

.leaflet-control-attribution {
  background: #161920cc !important; color: #6b7280 !important; font-size: 10px !important;
}
.leaflet-control-attribution a { color: #4b7ec8 !important; }
</style>
</head>
<body>

<header>
  <div>
    <h1>СИК в САЩ</h1>
    <div class="subtitle" id="subtitle">Loading…</div>
  </div>
  <div class="header-right">
    <div class="legend">
      <div class="legend-item"><div class="leg-dot" style="background:#4bc84b"></div>Open</div>
      <div class="legend-item"><div class="leg-dot" style="background:#3d8b5e"></div>Embassy / Consulate</div>
      <div class="legend-item"><div class="leg-dot" style="background:#4b8ec8"></div>Served (≤60 mi)</div>
      <div class="legend-item"><div class="leg-dot" style="background:#e8913a"></div>Far (60–200 mi)</div>
      <div class="legend-item"><div class="leg-dot" style="background:#c84b4b"></div>Disenfranchised (&gt;200 mi)</div>
    </div>
    <button class="toggle-btn" onclick="showSummary()">Summary</button>
  </div>
</header>

<div id="map"></div>

<div id="stats">
  <div class="stat">
    <span class="stat-label">Voter pool</span>
    <span class="stat-pool" id="st-pool">—</span>
  </div>
  <div class="stat">
    <span class="stat-label">Open sections</span>
    <span class="stat-open" id="st-open">—</span>
  </div>
  <div class="stat">
    <span class="stat-label">Embassy / consulate</span>
    <span class="stat-emb" id="st-emb">—</span>
  </div>
  <div class="stat-divider"></div>
  <div class="stat">
    <span class="stat-label">Served (≤60 mi)</span>
    <span class="stat-served" id="st-served">—</span>
  </div>
  <div class="stat">
    <span class="stat-label">Far (60–200 mi)</span>
    <span class="stat-atrisk" id="st-atrisk">—</span>
  </div>
  <div class="stat">
    <span class="stat-label">Disenfranchised (&gt;200 mi)</span>
    <span class="stat-lost" id="st-lost">—</span>
  </div>
  <div class="stat-note">
    Data: October 27, 2024 election results.
  </div>
</div>

<script>
// ── Constants ─────────────────────────────────────────────────────────────────
const SERVED_MI = 60;
const FAR_MI    = 200;

const STATUS_COLOR = {
  mandatory: '#3d8b5e',
  open:      '#4bc84b',
  served:    '#4b8ec8',
  atrisk:    '#e8913a',
  lost:      '#c84b4b',
};

// ── Map setup ─────────────────────────────────────────────────────────────────
const map = L.map('map', { center: [38.5, -96], zoom: 4 });
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap &copy; CARTO', subdomains: 'abcd', maxZoom: 19
}).addTo(map);

// ── Pin icon ──────────────────────────────────────────────────────────────────
function pinIcon(status, label, voters, maxVoters) {
  const isOpen = status === 'open' || status === 'mandatory';
  const size   = isOpen ? Math.round(26 + (voters / maxVoters) * 22) : 20;
  const fSize  = size >= 44 ? '11px' : size >= 36 ? '10px' : '9px';
  const color  = STATUS_COLOR[status];
  return L.divIcon({
    className: '',
    html: `<div style="
      width:${size}px;height:${size}px;background:${color};opacity:${isOpen?1:0.75};
      border:2px solid rgba(255,255,255,${isOpen?0.4:0.2});border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-family:'IBM Plex Mono',monospace;font-size:${fSize};font-weight:500;
      color:#fff;text-shadow:0 1px 2px rgba(0,0,0,0.8);
      box-shadow:0 2px 8px rgba(0,0,0,0.5);cursor:pointer;">${label}</div>`,
    iconSize: [size,size], iconAnchor: [size/2,size/2], popupAnchor: [0,-(size/2+4)],
  });
}

// ── Popup HTML ────────────────────────────────────────────────────────────────
function popupHtml(s) {
  const labels = {
    mandatory: 'Embassy / Consulate',
    open:      'Open',
    served:    'Served — within 60 mi',
    atrisk:    'Far — 60–200 mi',
    lost:      'Disenfranchised — over 200 mi',
  };
  const badge = `<span class="popup-badge badge-${s.status}">${labels[s.status]}</span><br>`;
  const isOpen = s.status === 'open' || s.status === 'mandatory';

  let body;
  if (isOpen) {
    body = `<div class="popup-count">${s.cumTotal.toLocaleString()}<span>total voters (incl. redirected)</span></div>`;
    body += `<div class="popup-sub">${s.votes2024} voters in 2024</div>`;
    if (s.zav > 0) body += `<div class="popup-sub">${s.zav} заявления 2026</div>`;
    if (s.dkp)     body += `<div class="popup-sub" style="margin-top:4px">Consulate: ${s.dkp}</div>`;
  } else {
    body = `<div class="popup-count">${s.votes2024}<span>voters in 2024</span></div>`;
    if (s.zav > 0) body += `<div class="popup-sub">${s.zav} заявления 2026</div>`;
    if (s.redirectTo) {
      body += `<div class="popup-sub" style="margin-top:5px">Redirected to: ${s.redirectTo}</div>`;
      body += `<div class="popup-sub">${Math.round(s.redirMiles)} mi driving</div>`;
    }
  }
  return `<div style="min-width:190px"><div class="popup-name">${s.name}</div>${badge}${body}</div>`;
}

let rawData = null;

// ── Load and render ───────────────────────────────────────────────────────────
async function loadData() {
  try {
    const r = await fetch('sections_outputs_from_xlsx.json');
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = rawData = await r.json();

    // Total voter pool from summary_scalars
    const scalars = Object.fromEntries(data.summary_scalars.map(s => [s.metric, s.value]));
    const total = Math.round(scalars.total_people);

    // Per-category counts computed from per-station data using SERVED_MI / FAR_MI thresholds
    let uServed = 0, uAtrisk = 0, uLost = 0;

    // Build redirect lookup: Short_Address → {redirectTo, redirMiles}
    const redirectMap = new Map();
    for (const row of data.redirect_summary) {
      redirectMap.set(row.source_short_address, {
        redirectTo: row.redirect_to,
        redirMiles: row.redir_miles,
      });
    }

    // Find max cum_total among open non-mandatory stations (for pin sizing)
    const maxCum = Math.max(...data.sections_27102024
      .filter(s => s.remains === 1 && !s.Посолство_Консулство)
      .map(s => s.cum_total));

    let nOpen = 0, nEmb = 0;

    for (const s of data.sections_27102024) {
      const isOpen = s.remains === 1;
      const isMand = !!s.Посолство_Консулство;

      let status, label, votersForSize;
      if (isOpen && isMand) {
        status = 'mandatory';
        label  = s.cum_total;
        votersForSize = s.cum_total;
        nEmb++;
      } else if (isOpen) {
        status = 'open';
        label  = s.cum_total;
        votersForSize = s.cum_total;
        nOpen++;
      } else {
        const redir = redirectMap.get(s.Short_Address);
        const miles = redir ? redir.redirMiles : 999;
        status = miles <= SERVED_MI ? 'served' : miles <= FAR_MI ? 'atrisk' : 'lost';
        label  = s.Общо_27_10_2024;
        votersForSize = 0; // fixed size for closed stations
        const v = s.Общо_27_10_2024 || 0;
        if (status === 'served') uServed += v;
        else if (status === 'atrisk') uAtrisk += v;
        else uLost += v;
      }
      if (isOpen) uServed += s.Общо_27_10_2024 || 0;

      const redir = redirectMap.get(s.Short_Address);
      const station = {
        name:       s.Секция,
        status,
        votes2024:  s.Общо_27_10_2024,
        zav:        s.Заявления || 0,
        cumTotal:   s.cum_total || 0,
        dkp:        s.Отговорно_ДКП || '',
        redirectTo: redir ? redir.redirectTo  : null,
        redirMiles: redir ? redir.redirMiles  : null,
      };

      L.marker([s.Latitude, s.Longitude], {
        icon: pinIcon(status, label, votersForSize, maxCum),
      })
      .bindPopup(popupHtml(station), { maxWidth: 280 })
      .addTo(map);
    }

    // Fill stats panel
    const pct = (n) => ` (${(n / total * 100).toFixed(1)}%)`;
    document.getElementById('st-pool').textContent    = total.toLocaleString();
    document.getElementById('st-open').textContent    = nOpen;
    document.getElementById('st-emb').textContent     = nEmb;
    document.getElementById('st-served').textContent  = uServed.toLocaleString() + pct(uServed);
    document.getElementById('st-atrisk').textContent  = uAtrisk.toLocaleString() + pct(uAtrisk);
    document.getElementById('st-lost').textContent    = uLost.toLocaleString()   + pct(uLost);

    document.getElementById('subtitle').textContent =
      `October 27, 2024 · ${total.toLocaleString()} voters · ${nOpen} open + ${nEmb} embassy/consulate`;

  } catch (err) {
    document.getElementById('subtitle').textContent = 'Error: ' + err.message;
    console.error(err);
  }
}

loadData();

// ── Summary modal ─────────────────────────────────────────────────────────────
function showSummary() {
  if (!rawData) return;
  const MIN_ZAV = 40;
  const sections = rawData.sections_27102024;

  const openMand    = sections.filter(s => s.remains === 1 &&  s.Посолство_Консулство).sort((a, b) => b.Заявления - a.Заявления);
  const openNonMand = sections.filter(s => s.remains === 1 && !s.Посолство_Консулство).sort((a, b) => b.Заявления - a.Заявления);
  const notSelected = sections.filter(s => s.remains === 0 && (s.Заявления || 0) >= MIN_ZAV).sort((a, b) => b.Заявления - a.Заявления);

  const hdr = `<div class="summary-hdr">
    <span style="min-width:2ch"></span>
    <span style="flex:1">Location</span>
    <span style="min-width:4ch;text-align:right">Зав.</span>
    <span style="min-width:4ch;text-align:right">2024</span>
  </div>`;

  const allOpen = [...openMand, ...openNonMand];
  let html = `<div class="summary-sub">Open sections (${allOpen.length})</div>${hdr}`;
  html += allOpen.map((s, i) => `<div class="summary-row">
    <span class="summary-idx">${i + 1}</span>
    <span class="summary-name" title="${s.Секция}">${s.Секция}</span>
    ${s.Посолство_Консулство ? '<span class="summary-emb">emb</span>' : ''}
    <span class="summary-zav">${s.Заявления || 0}</span>
    <span class="summary-v24">${s.Общо_27_10_2024 || 0}</span>
  </div>`).join('');

  html += `<div class="summary-sub" style="margin-top:14px">Eligible but not selected (${notSelected.length})</div>${hdr}`;
  html += notSelected.map((s, i) => `<div class="summary-row">
    <span class="summary-idx">${i + 1}</span>
    <span class="summary-name" title="${s.Секция}">${s.Секция}</span>
    <span class="summary-zav">${s.Заявления || 0}</span>
    <span class="summary-v24">${s.Общо_27_10_2024 || 0}</span>
  </div>`).join('');

  document.getElementById('summary-content').innerHTML = html;
  document.getElementById('summary-modal').classList.add('open');
}

function closeSummary() {
  document.getElementById('summary-modal').classList.remove('open');
}
</script>

<div id="summary-modal" onclick="if(event.target===this)closeSummary()">
  <div id="summary-box">
    <button class="summary-close" onclick="closeSummary()">✕</button>
    <div class="summary-heading">Section Summary</div>
    <div id="summary-content"></div>
  </div>
</div>

</body>
</html>
