<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polling Station Map</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'IBM Plex Mono', monospace;
  background: #0d0f14; color: #e8e4d9;
  height: 100vh; display: flex; flex-direction: column; overflow: hidden;
}

/* ── Header ── */
header {
  background: #161920; border-bottom: 1px solid #2a2f3d;
  flex-shrink: 0; padding: 8px 16px;
  display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
}
header h1 {
  font-family: 'Playfair Display', serif; font-size: 1.1rem;
  color: #c8a84b; white-space: nowrap;
}
.subtitle { font-size: 0.6rem; color: #6b7280; text-transform: uppercase; letter-spacing: 0.1em; margin-top: 2px; }

.header-right {
  margin-left: auto;
  display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
}

/* ── Legend ── */
.legend {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  font-size: 0.6rem; color: #8a95a8;
  text-transform: uppercase; letter-spacing: 0.07em;
}
.legend-item { display: flex; align-items: center; gap: 4px; cursor: default; }
.leg-dot { width: 9px; height: 9px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2); flex-shrink: 0; }

/* ── Slider ── */
.slider-wrap {
  display: flex; align-items: center; gap: 7px;
  font-size: 0.6rem; color: #8a95a8;
  text-transform: uppercase; letter-spacing: 0.07em;
}
.slider-wrap input[type=range] {
  -webkit-appearance: none; width: 100px; height: 3px;
  background: #2a2f3d; border-radius: 2px; outline: none; cursor: pointer;
}
.slider-wrap input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 13px; height: 13px;
  border-radius: 50%; background: #c8a84b; border: 2px solid #0d0f14;
}
.slider-val { color: #c8a84b; min-width: 3ch; }

/* ── Toggle button ── */
.toggle-btn {
  padding: 3px 10px; font-size: 0.6rem; font-family: 'IBM Plex Mono', monospace;
  background: #1e2a3a; border: 1px solid #2a2f3d; color: #8a95a8;
  cursor: pointer; border-radius: 2px;
  text-transform: uppercase; letter-spacing: 0.07em; transition: all 0.15s;
}
.toggle-btn.active { border-color: #4b8ec8; color: #4b8ec8; background: #0e1a2a; }
.toggle-btn:hover:not(.active) { border-color: #6b7280; color: #c8c4b9; }

/* ── Map ── */
#map { flex: 1; width: 100%; }

/* ── Stats panel ── */
#stats {
  position: absolute; bottom: 30px; right: 10px;
  background: #161920ee; border: 1px solid #2a2f3d;
  padding: 10px 14px; font-size: 0.63rem; line-height: 2.1;
  z-index: 1000; min-width: 210px;
}
.stat { display: flex; justify-content: space-between; gap: 16px; }
.stat-label { color: #6b7280; text-transform: uppercase; letter-spacing: 0.07em; }
.stat-open  { color: #4bc84b; }
.stat-emb   { color: #c8a84b; }
.stat-served { color: #4b8ec8; }
.stat-atrisk { color: #e8913a; }
.stat-lost  { color: #c84b4b; }

/* ── Popups ── */
.leaflet-popup-content-wrapper {
  background: #161920 !important; border: 1px solid #2a2f3d !important;
  border-radius: 2px !important; box-shadow: 0 4px 20px rgba(0,0,0,0.6) !important;
  color: #e8e4d9 !important; font-family: 'IBM Plex Mono', monospace !important;
}
.leaflet-popup-tip { background: #2a2f3d !important; }
.leaflet-popup-close-button { color: #6b7280 !important; font-size: 18px !important; }
.popup-name  { font-family: 'Playfair Display', serif; font-size: 0.95rem; color: #c8a84b; margin-bottom: 5px; line-height: 1.3; }
.popup-count { font-size: 1.2rem; font-weight: 500; color: #fff; }
.popup-count span { font-size: 0.62rem; color: #6b7280; margin-left: 4px; }
.popup-sub   { font-size: 0.62rem; color: #8a95a8; margin-top: 3px; }
.popup-badge { display: inline-block; font-size: 0.58rem; padding: 2px 7px; border-radius: 2px; margin-bottom: 5px; }
.badge-open      { background: #1a3a1a; color: #4bc84b; border: 1px solid #2a6a2a; }
.badge-mandatory { background: #3a2a0a; color: #c8a84b; border: 1px solid #6a5a2a; }
.badge-served    { background: #0e1a2a; color: #4b8ec8; border: 1px solid #2a4a6a; }
.badge-atrisk    { background: #2a1a08; color: #e8913a; border: 1px solid #6a4010; }
.badge-lost      { background: #3a1a1a; color: #c84b4b; border: 1px solid #6a2a2a; }
.badge-2024      { background: #0e1a2a; color: #4b7ec8; border: 1px solid #2a3a6a; }

.leaflet-control-attribution {
  background: #161920cc !important; color: #6b7280 !important; font-size: 10px !important;
}
.leaflet-control-attribution a { color: #4b7ec8 !important; }
</style>
</head>
<body>

<header>
  <div>
    <h1>Polling Station Map</h1>
    <div class="subtitle" id="subtitle">Loading…</div>
  </div>
  <div class="header-right">
    <div class="legend">
      <div class="legend-item"><div class="leg-dot" style="background:#4bc84b"></div>Open (top 20)</div>
      <div class="legend-item"><div class="leg-dot" style="background:#c8a84b"></div>Embassy</div>
      <div class="legend-item"><div class="leg-dot" style="background:#4b8ec8"></div>Served</div>
      <div class="legend-item"><div class="leg-dot" style="background:#e8913a"></div>Far</div>
      <div class="legend-item"><div class="leg-dot" style="background:#c84b4b"></div>Disenfranchised</div>
    </div>
    <div class="slider-wrap">
      <span>Travel limit</span>
      <input type="range" id="slider-travel" min="50" max="200" value="100" oninput="onTravelSlider(this.value)">
      <span class="slider-val" id="travel-val">100 mi</span>
    </div>
    <button class="toggle-btn" id="btn-2024" onclick="toggle2024(this)">Show 2024</button>
  </div>
</header>

<div id="map"></div>

<div id="stats">
  <div class="stat"><span class="stat-label">Open sections</span>   <span class="stat-open"   id="st-open">—</span></div>
  <div class="stat"><span class="stat-label">Embassy / consulate</span> <span class="stat-emb" id="st-emb">—</span></div>
  <div class="stat"><span class="stat-label">Served</span>           <span class="stat-served" id="st-served">—</span></div>
  <div class="stat"><span class="stat-label">Far (reachable)</span>  <span class="stat-atrisk" id="st-atrisk">—</span></div>
  <div class="stat"><span class="stat-label">Disenfranchised</span>  <span class="stat-lost"   id="st-lost">—</span></div>
</div>

<script>
const DISENFRANCHISED_MILES = 200;
let travelThreshold = 100;
let show2024 = false;

const map = L.map('map', { center: [38.5, -96], zoom: 4 });
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap &copy; CARTO', subdomains: 'abcd', maxZoom: 19
}).addTo(map);

const layer2026 = L.layerGroup().addTo(map);
const layer2024 = L.layerGroup();

// ── Distance ─────────────────────────────────────────────────────────────────
function distMiles(a, b) {
  const R = 3958.8;
  const φ1 = a.lat * Math.PI/180, φ2 = b.lat * Math.PI/180;
  const Δφ = (b.lat - a.lat) * Math.PI/180;
  const Δλ = (b.lng - a.lng) * Math.PI/180;
  const x = Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1-x));
}

// ── Status computation ────────────────────────────────────────────────────────
function computeStatuses(stations) {
  const mandatory  = stations.filter(s => s.mandatory);
  const voluntary  = stations.filter(s => !s.mandatory).sort((a,b) => b.voters - a.voters);
  const top20      = voluntary.slice(0, 20);
  const openSet    = [...mandatory, ...top20];

  return stations.map(s => {
    if (s.mandatory) return { ...s, status: 'mandatory' };
    if (top20.includes(s)) return { ...s, status: 'open' };

    let nearestDist = Infinity;
    let nearestName = '';
    for (const o of openSet) {
      const d = distMiles(s, o);
      if (d < nearestDist) { nearestDist = d; nearestName = o.name; }
    }
    nearestDist = Math.round(nearestDist);

    const status = nearestDist <= travelThreshold          ? 'served'
                 : nearestDist <= DISENFRANCHISED_MILES    ? 'atrisk'
                 : 'lost';
    return { ...s, status, nearestDist, nearestName };
  });
}

// ── Pin rendering ─────────────────────────────────────────────────────────────
const STATUS_COLOR = {
  mandatory: '#c8a84b',
  open:      '#4bc84b',
  served:    '#4b8ec8',
  atrisk:    '#e8913a',
  lost:      '#c84b4b',
};

function pinIcon(s, maxVoters) {
  const isOpen = s.status === 'open' || s.status === 'mandatory';
  const size   = isOpen ? Math.round(26 + (s.voters / maxVoters) * 22) : 20;
  const fSize  = size >= 44 ? '11px' : size >= 36 ? '10px' : '9px';
  const color  = STATUS_COLOR[s.status];
  const opacity = isOpen ? 1 : 0.75;
  return L.divIcon({
    className: '',
    html: `<div style="
      width:${size}px;height:${size}px;background:${color};opacity:${opacity};
      border:2px solid rgba(255,255,255,${isOpen?0.4:0.2});border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-family:'IBM Plex Mono',monospace;font-size:${fSize};font-weight:500;
      color:#fff;text-shadow:0 1px 2px rgba(0,0,0,0.8);
      box-shadow:0 2px 8px rgba(0,0,0,0.5);cursor:pointer;">${s.voters}</div>`,
    iconSize: [size,size], iconAnchor: [size/2,size/2], popupAnchor: [0,-(size/2+4)],
  });
}

function popupHtml(s) {
  const labels = { mandatory:'Embassy / Consulate', open:'Open — Top 20',
                   served:'Served', atrisk:'Far — Reachable', lost:'Disenfranchised' };
  const badge  = `<span class="popup-badge badge-${s.status}">${labels[s.status]}</span><br>`;
  const dist   = s.nearestDist != null
    ? `<div class="popup-sub">Nearest open: ${s.nearestName}<br>${s.nearestDist} mi away</div>`
    : '';
  return `<div style="min-width:180px">
    <div class="popup-name">${s.name}</div>
    ${badge}
    <div class="popup-count">${s.voters}<span>2026 заявления</span></div>
    ${dist}
  </div>`;
}

// ── Render 2026 layer ─────────────────────────────────────────────────────────
let stations2026cached = null;
let maxVoters2026 = 1;

function render2026() {
  if (!stations2026cached) return;
  layer2026.clearLayers();
  const statused = computeStatuses(stations2026cached);

  let nOpen=0, nEmb=0, votersServed=0, votersAtrisk=0, votersLost=0;
  statused.forEach(s => {
    if (s.status === 'open')      nOpen++;
    if (s.status === 'mandatory') nEmb++;
    if (s.status === 'served')    votersServed += s.voters;
    if (s.status === 'atrisk')    votersAtrisk += s.voters;
    if (s.status === 'lost')      votersLost   += s.voters;

    L.marker([s.lat, s.lng], { icon: pinIcon(s, maxVoters2026) })
     .bindPopup(popupHtml(s), { maxWidth: 270 })
     .addTo(layer2026);
  });

  const fmt = n => n.toLocaleString();
  const tot = stations2026cached.reduce((a,s) => a+s.voters, 0);
  const pct = n => ` (${Math.round(n/tot*100)}%)`;
  document.getElementById('st-open').textContent   = nOpen;
  document.getElementById('st-emb').textContent    = nEmb;
  document.getElementById('st-served').textContent = fmt(votersServed) + pct(votersServed);
  document.getElementById('st-atrisk').textContent = fmt(votersAtrisk) + pct(votersAtrisk);
  document.getElementById('st-lost').textContent   = fmt(votersLost)   + pct(votersLost);
}

// ── Render 2024 layer ─────────────────────────────────────────────────────────
function render2024(stations) {
  const maxV = Math.max(...stations.map(s => s.voters));
  layer2024.clearLayers();
  stations.forEach(s => {
    const size = Math.round(22 + (s.voters / maxV) * 18);
    const icon = L.divIcon({
      className: '',
      html: `<div style="
        width:${size}px;height:${size}px;background:#4b7ec8;opacity:0.55;
        border:2px solid rgba(255,255,255,0.2);border-radius:50%;
        display:flex;align-items:center;justify-content:center;
        font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:500;
        color:#fff;text-shadow:0 1px 2px rgba(0,0,0,0.8);
        box-shadow:0 2px 8px rgba(0,0,0,0.4);cursor:pointer;">${s.voters}</div>`,
      iconSize: [size,size], iconAnchor: [size/2,size/2], popupAnchor: [0,-(size/2+4)],
    });
    const badge = s.mandatory
      ? `<span class="popup-badge badge-mandatory">Embassy / Consulate</span><br>`
      : `<span class="popup-badge badge-2024">2024 station</span><br>`;
    L.marker([s.lat, s.lng], { icon })
     .bindPopup(`<div style="min-width:175px">
       <div class="popup-name">${s.name}</div>${badge}
       <div class="popup-count">${s.voters}<span>2024 voters</span></div>
     </div>`, { maxWidth: 260 })
     .addTo(layer2024);
  });
}

// ── Controls ──────────────────────────────────────────────────────────────────
function onTravelSlider(val) {
  travelThreshold = Number(val);
  document.getElementById('travel-val').textContent = val + ' mi';
  render2026();
}

function toggle2024(btn) {
  show2024 = !show2024;
  btn.classList.toggle('active', show2024);
  btn.textContent = show2024 ? 'Hide 2024' : 'Show 2024';
  if (show2024) map.addLayer(layer2024); else map.removeLayer(layer2024);
}

// ── Load ──────────────────────────────────────────────────────────────────────
async function loadData() {
  try {
    const [r26, r24] = await Promise.all([
      fetch('data/sections_2026.json'),
      fetch('data/sections_2024.json'),
    ]);
    if (!r26.ok) throw new Error(`sections_2026.json: HTTP ${r26.status}`);
    if (!r24.ok) throw new Error(`sections_2024.json: HTTP ${r24.status}`);

    const d26 = await r26.json();
    const d24 = await r24.json();

    stations2026cached = d26.stations;
    maxVoters2026 = Math.max(...d26.stations.map(s => s.voters));

    document.getElementById('subtitle').textContent =
      `2026: ${d26.total.toLocaleString()} заявления · ${d26.stations.length} locations`;

    render2026();
    render2024(d24.stations);

  } catch (err) {
    console.error('[map] Failed to load data:', err);
    document.getElementById('subtitle').textContent = 'Error loading data — see console';
  }
}

loadData();
</script>
</body>
</html>
